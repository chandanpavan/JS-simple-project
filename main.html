<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div id="design">
      <h1>Info</h1>
      <div id="srcimg">
        <h1>Image comes here</h1>
      </div>
      <div id="btn">
        <button id="button">Click Mee! For more Info</button>
      </div>
    </div>
  </body>
  <script>
    const requestUrl = "https://api.github.com/users/chandanpavan";
    const xhr = new XMLHttpRequest();
    // xhr.open("GET", requestUrl);

    const response = document
      .getElementById("button")
      .addEventListener("click", () => {
        // xhr open()
        xhr.open("GET", requestUrl);
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            // checking the state of xhr
            const data = JSON.parse(this.responseText); // the data comes as String from the API so converting into JSON
            let followers = document.getElementById("followers");
            if (!followers) {
              // creating the id if not present
              followers = document.createElement("followers");
              followers.id = "followers";
              document.getElementById("design").appendChild(followers); // appending the followers id to the design id as a child
            }
            const imgResponce = document.getElementById("srcimg");
            followers.textContent = data.followers; // displaying the text
            const response = data.avatar_url;
            imgResponce.innerHTML = `<img src="${response}" alt="Avatar" />`; // displaying the img through inner html usage
            console.log("Getting the data");
          }
        };
        xhr.send(); //
      });

    // const img = document.createElement("img");
    // img.src = data.avatar_url;
    // document.body.appendChild(img);
  </script>
</html>
